<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan 2 Loan Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; color: #333; }
        .inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .inputs label { display: flex; flex-direction: column; font-size: 0.9em; font-weight: bold; }
        input[type="number"], input[type="text"] { padding: 8px; font-size: 1em; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="number"]:disabled { background: #e9ecef; color: #6c757d; cursor: not-allowed; }
        .years-remaining { font-size: 0.85em; color: #6c757d; margin-top: 4px; }
        .years-remaining span { font-weight: bold; color: #495057; }

        .sliders-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .slider-control { background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #e9ecef; }
        .slider-wrapper { position: relative; padding-top: 35px; margin: 5px 0; }
        input[type="range"] { width: 100%; margin: 0; display: block; }
        .slider-value { font-weight: bold; color: #007bff; font-size: 1.1em; }
        
        .cap-indicator { position: absolute; top: 0; transform: translateX(-50%); font-size: 0.8em; font-weight: bold; text-align: center; pointer-events: none; width: 100px; }
        .cap-indicator.high { color: #d39e00; }
        .cap-indicator.low { color: #dc3545; }
        .cap-indicator::after { content: "▼"; display: block; font-size: 1.2em; line-height: 0.8; margin-top: 2px; }

        .callouts { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .callout { flex: 1; min-width: 200px; padding: 15px; border-radius: 6px; border-left: 5px solid; background: #f8f9fa; }
        .callout.break-even { border-color: #20c997; }
        .callout.max-paid { border-color: #6f42c1; }
        .callout-title { font-size: 0.9em; text-transform: uppercase; color: #666; font-weight: bold; margin-bottom: 5px; }
        .callout-value { font-size: 1.4em; font-weight: bold; margin-bottom: 5px; }
        .callout-sub { font-size: 0.9em; color: #555; }

        .results-grid { display: grid; grid-template-columns: 1fr 450px; gap: 20px; align-items: start; }
        @media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }
        
        .chart-container { position: relative; height: 500px; width: 100%; background: #fff; padding: 15px; border: 1px solid #e9ecef; border-radius: 6px; box-sizing: border-box; }
        
        .table-container { border: 1px solid #e9ecef; border-radius: 6px; overflow-x: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; font-weight: bold; }
        .row-thresh { background-color: #fcfcfc; color: #6c757d; font-style: italic; }
        .row-breakeven { background-color: #e8f5e9; font-weight: bold; color: #198754; }
    </style>
</head>
<body>
    <div class="inputs">
        <label>Balance (£) <input type="number" id="balance" value="50000" onchange="updateStaticParams()"></label>
        <label>Low Thresh (£) <input type="number" id="lowThresh" value="29385" onchange="updateStaticParams()"></label>
        <label>High Thresh (£) <input type="number" id="highThresh" value="52885" onchange="updateStaticParams()"></label>
        <label>Total Rate Cap (%) <input type="number" id="cap" value="6" step="0.1" onchange="updateStaticParams()"></label>
        <label>
            Loan Start Year
            <input type="number" id="startYear" value="2020" min="2012" max="2026" onchange="updateStaticParams()">
            <span class="years-remaining">Years remaining: <span id="yearsRemainingDisplay">?</span></span>
        </label>
        <label style="grid-column: span 2;">Test Salaries (£, CSV) 
            <input type="text" id="testSalaries" value="30000, 45000, 60000, 80000" onchange="requestRender()">
        </label>
    </div>

    <div class="sliders-container">
        <div class="slider-control">
            <label>RPI (%): <span class="slider-value" id="rpiValue">3.0</span></label>
            <div class="slider-wrapper">
                <div id="capIndHigh" class="cap-indicator high">Cap Hits<br>(High Sal)</div>
                <div id="capIndLow" class="cap-indicator low">Cap Hits<br>(Low Sal)</div>
                <input type="range" id="rpiSlider" min="0" max="8" step="0.1" value="3" oninput="updateSliders(); requestRender();">
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.85em; color: #666; margin-top: 5px;">
                <span>0%</span><span>8%</span>
            </div>
        </div>

        <div class="slider-control">
            <label>Salary Growth (%): <span class="slider-value" id="growthValue">2.0</span></label>
            <div class="slider-wrapper" style="padding-top: 15px;">
                <input type="range" id="growthSlider" min="0" max="10" step="0.1" value="2" oninput="updateSliders(); requestRender();">
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.85em; color: #666; margin-top: 5px;">
                <span>0%</span><span>10%</span>
            </div>
        </div>

        <div class="slider-control">
            <label>Threshold Growth (%): <span class="slider-value" id="threshGrowthValue">2.0</span></label>
            <div class="slider-wrapper" style="padding-top: 15px;">
                <input type="range" id="threshGrowthSlider" min="0" max="10" step="0.1" value="2" oninput="updateSliders(); requestRender();">
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 0.85em; color: #666; margin-top: 5px;">
                <span>0%</span><span>10%</span>
            </div>
        </div>
    </div>

    <div class="callouts">
        <div class="callout break-even" id="cbCallout">
            <div class="callout-title">Break-even Salary</div>
            <div class="callout-value" id="cbValue">£0</div>
            <div class="callout-sub" id="cbSub">Pays off before write-off</div>
        </div>
        <div class="callout max-paid" id="cmCallout">
            <div class="callout-title">Maximum Repaid</div>
            <div class="callout-value" id="cmValue">£0</div>
            <div class="callout-sub" id="cmSub">At salary £0</div>
        </div>
    </div>

    <div class="results-grid">
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Salary</th>
                        <th>Init Rate</th>
                        <th>Total Paid</th>
                        <th>Written Off</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let chart; 
        let currentRPI = 0.03;
        let currentGrowth = 0.02;
        let currentThreshGrowth = 0.02;
        
        let cachedYAxisMax = 10000;
        let cachedMaxSalaryPlot = 200000;
        let cachedYearsRemaining = 30;
        let renderFrameId = null;

        const STATUTORY_TERM = 30;
        const CURRENT_YEAR = new Date().getFullYear();

        function getYearsRemaining() {
            const startYear = parseInt(document.getElementById('startYear').value) || CURRENT_YEAR;
            const elapsed = CURRENT_YEAR - startYear;
            return Math.max(1, Math.min(STATUTORY_TERM, STATUTORY_TERM - elapsed));
        }

        function updateSliders() {
            const rpiSlider = document.getElementById('rpiSlider');
            const growthSlider = document.getElementById('growthSlider');
            const threshGrowthSlider = document.getElementById('threshGrowthSlider');
            
            currentRPI = parseFloat(rpiSlider.value) / 100;
            currentGrowth = parseFloat(growthSlider.value) / 100;
            currentThreshGrowth = parseFloat(threshGrowthSlider.value) / 100;
            
            document.getElementById('rpiValue').textContent = rpiSlider.value;
            document.getElementById('growthValue').textContent = growthSlider.value;
            document.getElementById('threshGrowthValue').textContent = threshGrowthSlider.value;
        }

        function updateCapIndicator() {
            const cap = parseFloat(document.getElementById('cap').value);
            const slider = document.getElementById('rpiSlider');
            const max = parseFloat(slider.max);
            const min = parseFloat(slider.min);
            
            const capRpiHigh = cap - 3;
            const capRpiLow = cap;
            const getPercent = (val) => Math.max(0, Math.min(100, ((val - min) / (max - min)) * 100));

            const indHigh = document.getElementById('capIndHigh');
            if (capRpiHigh >= min && capRpiHigh <= max) {
                indHigh.style.left = `${getPercent(capRpiHigh)}%`;
                indHigh.style.display = 'block';
            } else { indHigh.style.display = 'none'; }

            const indLow = document.getElementById('capIndLow');
            if (capRpiLow >= min && capRpiLow <= max) {
                indLow.style.left = `${getPercent(capRpiLow)}%`;
                indLow.style.display = 'block';
            } else { indLow.style.display = 'none'; }
        }

        function getInterestRate(rpi, salary, lowThresh, highThresh, cap) {
            const capRate = cap / 100;
            if (salary <= lowThresh) return Math.min(rpi, capRate);
            if (salary >= highThresh) return Math.min(rpi + 0.03, capRate);
            return Math.min(rpi + 0.03 * ((salary - lowThresh) / (highThresh - lowThresh)), capRate);
        }

        function simulateMonthly(balance, initSalary, lowThresh, highThresh, rpi, growth, threshGrowth, cap, maxYears) {
            let currentBalance = balance;
            let totalPaid = 0;
            let months = 0;
            
            let sal = initSalary;
            let lt = lowThresh;
            let ht = highThresh;

            for (let y = 0; y < maxYears; y++) {
                if (currentBalance <= 0) break;

                const annualRate = getInterestRate(rpi, sal, lt, ht, cap);
                const monthlyRate = annualRate / 12;
                const monthlyRepayment = Math.max(0, (sal - lt) * 0.09) / 12;

                for (let m = 0; m < 12; m++) {
                    if (currentBalance <= 0) break;
                    
                    const interest = currentBalance * monthlyRate;
                    let actualRepayment = monthlyRepayment;

                    if (currentBalance + interest < monthlyRepayment) {
                        actualRepayment = currentBalance + interest;
                    }

                    currentBalance = currentBalance + interest - actualRepayment;
                    totalPaid += actualRepayment;
                    months++;
                }

                sal *= (1 + growth);
                lt *= (1 + threshGrowth);
                ht *= (1 + threshGrowth);
            }
            
            return { totalPaid, years: months / 12, writtenOff: currentBalance > 0 ? currentBalance : 0 };
        }

        function updateStaticParams() {
            const balance = parseFloat(document.getElementById('balance').value) || 0;
            const lowThresh = parseFloat(document.getElementById('lowThresh').value) || 29385;
            const highThresh = parseFloat(document.getElementById('highThresh').value) || 52885;
            const cap = parseFloat(document.getElementById('cap').value) || 6;

            cachedYearsRemaining = getYearsRemaining();
            document.getElementById('yearsRemainingDisplay').textContent = cachedYearsRemaining;

            let calculatedMax = Math.ceil(((balance / 3) / 0.09 + lowThresh) / 10000) * 10000;
            cachedMaxSalaryPlot = Math.max(80000, Math.min(600000, calculatedMax)); 

            const maxSliderRpi = parseFloat(document.getElementById('rpiSlider').max) / 100;
            const maxSliderGrowth = parseFloat(document.getElementById('growthSlider').max) / 100;
            const minSliderThresh = parseFloat(document.getElementById('threshGrowthSlider').min) / 100;
            
            let globalMaxPaid = 0;
            for (let g of [0, maxSliderGrowth]) {
                for (let i = 0; i <= cachedMaxSalaryPlot; i += 5000) { 
                    const res = simulateMonthly(balance, i, lowThresh, highThresh, maxSliderRpi, g, minSliderThresh, cap, cachedYearsRemaining);
                    if (res.totalPaid > globalMaxPaid) globalMaxPaid = res.totalPaid;
                }
            }
            cachedYAxisMax = Math.max(10000, Math.ceil(globalMaxPaid / 10000) * 10000);

            requestRender();
        }

        function requestRender() {
            if (renderFrameId) cancelAnimationFrame(renderFrameId);
            renderFrameId = requestAnimationFrame(calculate);
        }

        function calculate() {
            updateCapIndicator();
            const balance = parseFloat(document.getElementById('balance').value) || 0;
            const lowThresh = parseFloat(document.getElementById('lowThresh').value) || 29385;
            const highThresh = parseFloat(document.getElementById('highThresh').value) || 52885;
            const cap = parseFloat(document.getElementById('cap').value) || 6;
            const maxYears = cachedYearsRemaining;
            
            const rpi = currentRPI;
            const growth = currentGrowth;
            const threshGrowth = currentThreshGrowth;

            const stepSize = Math.max(250, Math.floor(cachedMaxSalaryPlot / 300)); 
            const numSteps = Math.floor(cachedMaxSalaryPlot / stepSize);
            const salaries = Array.from({length: numSteps + 1}, (_, i) => i * stepSize);

            const totalPaid = [];
            const years = [];
            let maxPaidVal = -1;
            let maxPaidSal = null;
            let breakEvenSal = null;
            let breakEvenPaid = null;

            for (let i = 0; i < salaries.length; i++) {
                const res = simulateMonthly(balance, salaries[i], lowThresh, highThresh, rpi, growth, threshGrowth, cap, maxYears);
                totalPaid.push(res.totalPaid);
                years.push(res.years);
                
                if (res.totalPaid > maxPaidVal) {
                    maxPaidVal = res.totalPaid;
                    maxPaidSal = salaries[i];
                }
                if (breakEvenSal === null && res.years < maxYears) {
                    breakEvenSal = salaries[i];
                    breakEvenPaid = res.totalPaid;
                }
            }

            const testSalsStr = document.getElementById('testSalaries').value;
            const testSals = testSalsStr.split(',').map(s => parseFloat(s.trim())).filter(s => !isNaN(s));
            let tableEntries = [];
            
            testSals.forEach(sal => { tableEntries.push({ label: `£${sal.toLocaleString()}`, val: sal, class: '' }); });
            tableEntries.push({ label: `£${lowThresh.toLocaleString()} (Low Thresh)`, val: lowThresh, class: 'row-thresh' });
            tableEntries.push({ label: `£${highThresh.toLocaleString()} (High Thresh)`, val: highThresh, class: 'row-thresh' });
            
            if (breakEvenSal !== null) {
                tableEntries.push({ label: `£${breakEvenSal.toLocaleString()} (Break-even)`, val: breakEvenSal, class: 'row-breakeven' });
            }

            tableEntries.sort((a, b) => a.val - b.val);

            let tbody = '';
            tableEntries.forEach(entry => {
                const initRate = getInterestRate(rpi, entry.val, lowThresh, highThresh, cap) * 100;
                const res = simulateMonthly(balance, entry.val, lowThresh, highThresh, rpi, growth, threshGrowth, cap, maxYears);
                const writtenOffDisplay = res.writtenOff > 0 ? `£${Math.round(res.writtenOff).toLocaleString()}` : "£0";
                
                tbody += `<tr class="${entry.class}">
                    <td>${entry.label}</td>
                    <td>${initRate.toFixed(2)}%</td>
                    <td>£${Math.round(res.totalPaid).toLocaleString()}</td>
                    <td>${writtenOffDisplay}</td>
                </tr>`;
            });
            document.getElementById('tableBody').innerHTML = tbody;

            const isSamePoint = breakEvenSal !== null && Math.abs(maxPaidSal - breakEvenSal) <= stepSize * 2;
            document.getElementById('cbValue').textContent = breakEvenSal !== null ? `£${breakEvenSal.toLocaleString()}` : 'N/A';
            document.getElementById('cbSub').textContent = breakEvenSal !== null ? `Total Paid: £${Math.round(breakEvenPaid).toLocaleString()}` : `Does not break even within ${maxYears} yrs`;
            
            const maxPaidCallout = document.getElementById('cmCallout');
            if (isSamePoint) {
                maxPaidCallout.style.display = 'none';
            } else {
                maxPaidCallout.style.display = 'block';
                document.getElementById('cmValue').textContent = `£${Math.round(maxPaidVal).toLocaleString()}`;
                document.getElementById('cmSub').textContent = `At starting salary £${maxPaidSal.toLocaleString()}`;
            }

            const annotations = {};
            if (breakEvenSal !== null) {
                annotations.breakEven = {
                    type: 'line', scaleID: 'x', value: `£${(breakEvenSal/1000).toFixed(1)}k`,
                    borderColor: 'rgba(32, 201, 151, 0.8)', borderWidth: 2, borderDash: [5, 5],
                    label: { display: true, content: 'Break-even', position: 'start', backgroundColor: 'rgba(32, 201, 151, 0.9)' }
                };
            }
            if (maxPaidSal !== null && !isSamePoint) {
                annotations.maxPaid = {
                    type: 'line', scaleID: 'x', value: `£${(maxPaidSal/1000).toFixed(1)}k`,
                    borderColor: 'rgba(111, 66, 193, 0.8)', borderWidth: 2, borderDash: [5, 5],
                    label: { display: true, content: 'Max Repaid', position: 'center', backgroundColor: 'rgba(111, 66, 193, 0.9)' }
                };
            }

            const chartLabels = salaries.map(s => `£${(s/1000).toFixed(1)}k`);

            const ctx = document.getElementById('chart').getContext('2d');
            if (!chart) {
                chart = new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: chartLabels, 
                        datasets: [
                            { label: 'Total Paid', data: totalPaid, borderColor: '#36A2EB', backgroundColor: 'rgba(54, 162, 235, 0.1)', yAxisID: 'y-paid', fill: false, pointRadius: 0, tension: 0.1, borderWidth: 2 },
                            { label: 'Years to Repay', data: years, borderColor: '#FF6384', borderDash: [5, 5], yAxisID: 'y-term', fill: false, pointRadius: 0, tension: 0.1, borderWidth: 2 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Initial Annual Salary (£)' }, ticks: { maxTicksLimit: 15 } },
                            'y-paid': { type: 'linear', position: 'left', title: { display: true, text: 'Total Paid (£)' }, beginAtZero: true, max: cachedYAxisMax },
                            'y-term': { type: 'linear', position: 'right', title: { display: true, text: 'Years Remaining' }, beginAtZero: true, max: maxYears, grid: { drawOnChartArea: false } }
                        },
                        plugins: { 
                            annotation: { annotations },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) label += ': ';
                                        if (context.datasetIndex === 0) label += new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP', maximumFractionDigits: 0 }).format(context.parsed.y);
                                        else if (context.datasetIndex === 1) label += context.parsed.y.toFixed(1) + ' yrs';
                                        return label;
                                    }
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false },
                        animation: false
                    }
                });
            } else {
                chart.data.labels = chartLabels;
                chart.data.datasets[0].data = totalPaid;
                chart.data.datasets[1].data = years;
                chart.options.scales['y-paid'].max = cachedYAxisMax;
                chart.options.scales['y-term'].max = maxYears;
                chart.options.plugins.annotation.annotations = annotations;
                chart.update('none');
            }
        }
        
        updateSliders();
        updateStaticParams();
    </script>
</body>
</html>
